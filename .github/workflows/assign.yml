name: Assign Issue
on:
  schedule:
    - cron: "0 0 * * *"
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  assign:
    permissions:
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Assign the user or unassign
        uses: takanome-dev/assign-issue-action@v1.6.1
